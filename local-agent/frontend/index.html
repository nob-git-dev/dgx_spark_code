<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Agent</title>
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/chat.css">
  <!-- Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Local Agent</h2>
        <button class="btn btn-primary btn-sm" id="btn-new-chat">+ New</button>
      </div>
      <div class="conversation-list" id="conversation-list"></div>
    </aside>

    <!-- Main chat area -->
    <main class="main">
      <!-- Header -->
      <header class="chat-header">
        <button class="btn btn-ghost btn-sm sidebar-toggle" id="btn-sidebar-toggle">☰</button>
        <span class="chat-title" id="chat-title">New Chat</span>
        <select class="model-select" id="model-select">
          <option value="gpt-oss-120b-128k">読み込み中...</option>
        </select>
      </header>

      <!-- Messages -->
      <div class="chat-container" id="chat-container">
        <div class="messages" id="messages">
          <div class="welcome-message">
            <h3>Local Agent</h3>
            <p>ローカルAIエージェント — モデルを選択して対話できます。</p>
            <div class="capabilities">
              <div class="capability">🔍 Web検索</div>
              <div class="capability">📁 ファイル操作</div>
              <div class="capability">💻 コマンド実行</div>
              <div class="capability">📄 文書検索 (RAG)</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="chat-input"
            placeholder="メッセージを入力... (⌘/Ctrl+Enter で送信)"
            rows="1"
          ></textarea>
          <button class="btn btn-primary btn-send" id="btn-send" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/>
            </svg>
          </button>
          <button class="btn btn-stop" id="btn-stop" style="display:none" title="Stop generating">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <rect x="2" y="2" width="12" height="12" rx="2"/>
            </svg>
          </button>
        </div>
        <div class="input-actions">
          <label class="btn btn-ghost btn-sm upload-btn">
            📎 Upload Document
            <input type="file" id="file-input" hidden accept=".txt,.md,.py,.js,.json,.csv,.html,.yaml,.yml,.toml">
          </label>
          <span class="upload-status" id="upload-status"></span>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
