# Nemotron-9B-v2-Japanese NVFP4 on vLLM (DGX Spark / GB10 Blackwell)
#
# ModelOpt で NVFP4 量子化済みモデルを使用。量子化情報は config.json に埋め込み済み。
# FP8 に戻す場合: --quantization fp8 を追加し、model パスを HF ID に変更
#
# 量子化の再現手順: docker compose -f docker-compose.quantize.yml run --rm quantize

services:
  vllm-chat:
    image: nvcr.io/nvidia/vllm:${VLLM_IMAGE_TAG:-26.01-py3}
    container_name: vllm-chat
    ports:
      - "${CHAT_PORT:-8001}:8000"
    volumes:
      - ${HF_CACHE_VOLUME:-vllm_hf_cache}:/root/.cache/huggingface
      - ./models/nemotron-9b-v2-japanese-nvfp4:/models/nemotron-nvfp4:ro
      - ./plugins:/workspace/plugins:ro
    dns:
      - 8.8.8.8
      - 8.8.4.4
    security_opt:
      - seccomp:unconfined
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - TORCH_COMPILE_DISABLE=1
      - TORCH_MATMUL_PRECISION=high
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    shm_size: "8gb"
    command: >
      vllm serve /models/nemotron-nvfp4
      --served-model-name NVIDIA-Nemotron-Nano-9B-v2-Japanese-NVFP4
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization ${GPU_MEMORY_UTIL_CHAT:-0.20}
      --max-model-len ${MAX_MODEL_LEN:-32768}
      --trust-remote-code
      --reasoning-parser-plugin /workspace/plugins/nemotron_nano_v2_reasoning_parser.py
      --reasoning-parser nemotron_nano_v2
      --enable-auto-tool-choice
      --tool-parser-plugin /workspace/plugins/nemotron_toolcall_parser_streaming.py
      --tool-call-parser nemotron_json
      --max-num-seqs 64
      --mamba_ssm_cache_dtype float16
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - llm-network

networks:
  llm-network:
    external: true

volumes:
  vllm_hf_cache:
