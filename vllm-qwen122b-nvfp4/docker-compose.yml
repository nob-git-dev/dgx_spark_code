services:
  vllm-qwen122b:
    build: .
    image: vllm-spark:qwen3.5-122b-nvfp4
    container_name: vllm-qwen122b
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - VLLM_USAGE_SOURCE=production
      # BF16 matmul precision (NVFP4 dequant -> BF16 computation)
      - TORCH_MATMUL_PRECISION=high
      # CUDA allocator fragmentation suppression (stability for long inference)
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      # NVFP4 MoE backend:
      # VLLM_USE_FLASHINFER_MOE_FP4=0 -> native cutlass_moe_fp4 (SM12x compatible)
      # FlashInfer MoE FP4 backends require FP8 activations, which fail on SM121
      - VLLM_USE_FLASHINFER_MOE_FP4=0
      # Marlin W4A16 vs CUTLASS W4A4: A/B tested at ~15.2 tok/s both on SM121 122B
      # Keep native CUTLASS for stability
      - VLLM_NVFP4_MOE_FORCE_MARLIN=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ${MODEL_HOST_PATH}:/models/txn545_Qwen3.5-122B-A10B-NVFP4:ro
      - ./.cache/flashinfer:/root/.cache/flashinfer
      - ./.cache/vllm:/root/.cache/vllm
    ports:
      - "${HOST_PORT:-8000}:8000"
    ipc: host
    ulimits:
      memlock:
        soft: -1
        hard: -1
    # MTP (speculative decoding) is DISABLED initially.
    # txn545 checkpoint does not include mtp_weights.safetensors.
    # To enable MTP later, add:
    #   --speculative-config '{"method":"mtp","num_speculative_tokens":1}'
    # and extract MTP weights from Qwen/Qwen3.5-122B-A10B.
    command: >
      vllm serve /models/txn545_Qwen3.5-122B-A10B-NVFP4
      --served-model-name txn545_Qwen3.5-122B-A10B-NVFP4
      --tensor-parallel-size 1
      --max-model-len ${MAX_MODEL_LEN:-131072}
      --max-num-seqs ${MAX_NUM_SEQS:-4}
      --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION:-0.9}
      --trust-remote-code
      --host 0.0.0.0
      --port 8000
      --dtype auto
      --kv-cache-dtype fp8
      --attention-backend flashinfer
      --enable-chunked-prefill
      --max-num-batched-tokens ${MAX_NUM_BATCHED_TOKENS:-131072}
      --load-format safetensors
      --enable-prefix-caching
      --reasoning-parser qwen3
      --no-enable-flashinfer-autotune
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 600s
    restart: unless-stopped
    networks:
      - llm-network

networks:
  llm-network:
    external: true
