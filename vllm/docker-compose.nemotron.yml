services:
  vllm:
    # Nemotron-Nano-9B-v2-Japanese 用のオーバーライド設定
    # 使い方: docker compose -f docker-compose.yml -f docker-compose.nemotron.yml up -d
    command: >
      vllm serve nvidia/NVIDIA-Nemotron-Nano-9B-v2-Japanese
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization 0.90
      --max-model-len 32768
      --trust-remote-code
      --reasoning-parser-plugin /workspace/plugins/nemotron_nano_v2_reasoning_parser.py
      --reasoning-parser nemotron_nano_v2
      --enable-auto-tool-choice
      --tool-parser-plugin /workspace/plugins/nemotron_toolcall_parser_streaming.py
      --tool-call-parser nemotron_json
      --max-num-seqs 64
      --mamba_ssm_cache_dtype float32
    volumes:
      - ./scripts/plugins:/workspace/plugins:ro
